services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chief-backend
    environment:
      APP_NAME: CHIEF
      APP_ENVIRONMENT: development
      LOG_LEVEL: INFO
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: chief
      POSTGRES_PASSWORD: chief
      POSTGRES_DB: chief
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      ENABLE_CONNECTIVITY_CHECKS: true
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: chief-postgres
    environment:
      POSTGRES_USER: chief
      POSTGRES_PASSWORD: chief
      POSTGRES_DB: chief
    # Do not bind the Postgres container to host port to avoid conflicts with a native Postgres service
    # ports:
    #   - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: chief-redis
    # Do not bind Redis to host port to avoid conflicts with native Redis
    # ports:
    #   - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
